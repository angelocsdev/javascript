<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>
    <main>
        <div>
            <p>Ano de Nascimento: <input type="number" name="txtano" id="txtano"></p>
            <p>Sexo:
                <input type="radio" name="radsex" id="masc" checked>
                <label for="masc">Masculino</label>
                <input type="radio" name="radsex" id="femi">
                <label for="femi">Feminino</label>
            </p>
            <p>
                <input class="botao" type="button" value="Verificar" onclick="verificar()">
            </p>
        </div>
        <div class="res">
            Preencha os dados acima para ver o resultado!
        </div>
    </main>
    <footer>
        <p>&copy; CursoemVideo</p>
    </footer>

    <script src="script.js"></script><!-- Use script:src para criar um arquivo JS fora do HTML. -->
</body>
</html>
