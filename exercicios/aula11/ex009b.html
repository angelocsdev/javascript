<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
</head>
<body>
    <h1>Onde você mora?</h1>
    Digite seu país: <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="Verifique" onclick="verificar()">
    <div class="res">Resultado: </div>

    <script>
        function verificar() {
            var txtp = document.querySelector('input#txtpais')
            var res = document.querySelector('div.res')
            var pais = String(txtp.value)
            res.innerHTML = `<p>Você mora em <strong>${pais}</strong>!</p>`
            if (pais != 'Brasil') {// Lembrar de colocar o valor da condição, nesse caso: 'Brasil' entre apas simples. ;)
                res.innerHTML += `<p>Você é estrangeiro!</p>`
            }else {
                res.innerHTML += `<p>Você é brasileiro!</p>`
            }
        }
    </script>
</body>
</html>
