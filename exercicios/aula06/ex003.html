<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        main {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(yellow, cyan);
            color: rgb(20, 20, 20);
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }

        main > h1 {
            padding: 30px;
            font-size: 4em;
        }
        main > p {
            padding: 10px;
            color: white;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <main>
        <h1>Olá, Mundo!</h1>
        <p>Já me livrei da maldição! Ufa... Kkk</p>
    </main>

    <script>
        var n1 = Number(window.prompt('Digite um número: ')) // string
        var n2 = Number(window.prompt('Digite outro número: ')) // string
        var s = n1 + n2
        window.alert(`A soma entre ${n1} e ${n2} é igual a ${s}`) // concatenação
        // number + number adição
        // string + string concatenação, que é a junção das var's
        /*
        Para converter um 'string' para 'number' usa-se:

        Number.parseInt(n) para números inteiros
        Number.parseFloat(n) para números com pontos e vírgulas
        Number(n)
        */

        /*
        Para converter 'number' para 'string' usa-se:

        String(n)
        n.toString()
        */


       /*
       template string

        `O aluno ${nome} com ${idade} anos tirou a nota ${nota}`

        Os templates são abertos com crase `.
        $ é placeholder
       */

       /*
       Formatando strings:

       s.length -> quantos caracteres a string tem
       s.toUpperCase() -> transforma todas as letras em maiúsculas
       s.toLowerCase() -> transforma todas as letras em minúsculas
       */

       /*
       Formatando numbers:

       var n1 = 1545.5
       n1.toFixed(2) -> usado para ter 2 casas decimais nos números.
       '1545.50'

       n1.toFixed(2).replace('.', ',') -> usado para trocar uma coisa por outra, como no exemplo, trocar ponto por vírgula.
       '1545,50'

       n1.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'}) - > usado para colocar em real.
       'R$ 1,545.50'

       n1.toLocaleString('pt-BR', {style: 'currency', currency: 'USD'}) - > usado para colocar em dólar.
       'US$ 1,545.50'

       n1.toLocaleString('pt-BR', {style: 'currency', currency: 'EUR'}) - > usado para colocar em euro.
       */
    </script>
</body>
</html>
