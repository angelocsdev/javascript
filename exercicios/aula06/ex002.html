<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        main {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(yellow, cyan);
            color: rgb(20, 20, 20);
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }

        main > h1 {
            padding: 30px;
            font-size: 4em;
        }
        main > p {
            padding: 10px;
            color: white;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <main>
        <h1>Olá, Mundo!</h1>
        <p>Já me livrei da maldição! Ufa... Kkk</p>
    </main>

    <script>
        var nome = window.prompt('Qual é o seu nome?')
        window.alert('É um grande prazer te conhecer, ' + nome + '!') /* + tem a função de 'Concatenação' */
    </script>
</body>
</html>
