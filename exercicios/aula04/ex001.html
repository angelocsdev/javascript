<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        main {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(yellow, cyan);
            color: rgb(20, 20, 20);
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }

        main > h1 {
            padding: 30px;
            font-size: 4em;
        }
        main > p {
            padding: 10px;
            color: white;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <main>
        <h1>Olá, Mundo!</h1>
        <p>Já me livrei da maldição! Ufa... Kkk</p>
    </main>

    <script>
        window.alert('Minha Primeira Mensagem') /* Comando usado para apresentar uma mensagem quando iniciar a página no navegador. ALERTAS. */
        window.confirm('Está gostando de JS?') /* Comando usado para confirmar algo na tela dando a opção de 'OK' e 'Cancelar'. CONFIRMAÇÕES. */
        window.prompt('Qual é o seu nome?') /* Usado para digitar algo em uma caixa de texto e confirmar ou cancelar. PERGUNTAS. */

        /*
        Um sinal de = em JavaScript se lê como 'recebe'.

        VARIÁVEIS

        "null" é usado quando quer deixar uma variável nula.
        "id's" em variáveis podem começar com letra, $ ou _ e não podem começar com números. É possível usar letras e números. É possível usar acentos e símbolos. Não podem conter espaços. E não podem ser palavras reservadas do JavaScript, como por exemplo: function, var.
        Maiúsculas e minúsculas faz diferença na hora de criar uma variável.
        Escolher nomes coerentes para as variáveis.

        typeof:

        

        */
    </script>
</body>
</html>
