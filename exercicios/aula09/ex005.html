<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros Passos com DOM</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            border: none;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(yellow, violet) no-repeat;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }
        h1, p, div {
            padding: 30px;
        }

        h1 {
            font-size: 4em;
        }

        p, div {
            font-size: 2em;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos com DOM</h1>
    <p>Aqui vai o resultado</p>
    <p>Aprendendo a usar <strong>DOM</strong> em JavaScript</p>
    <div>Clique em mim</div>
    <script>
        var corpo = window.document.body
        var p1 = window.document.getElementsByTagName('p') [0]/*Usado para selecionar um elemento. Ex: h1, p, div, main. O número entre '[]' é o parágrafo que vai aparecer > 0 é o primeiro, 1 é o segundo, 2 é o terceiro...*/
        corpo.style.background = 'linear-gradient(cyan, yellow)'
        p1.style.color = 'black'/* Também pode mudar o estilo. */
    </script>
</body>
</html>
