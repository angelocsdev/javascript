<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        div#area {
            padding: 30px;
            text-align: center;
            background-color: aqua;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            font-weight: bolder;
            font-size: 2em;
            color: white;
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="saiu()" onmousemove="mover()"><!-- Eventos -->
        Interaja...
    </div>

    <script>
        var a = window.document.getElementById('area')
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair)
        a.addEventListener('mousemove', mover)/* O 'addEventListener' é usado para ativar os eventos direto do JS. Sem precisar 'poluir' o HTML. */

        function clicar() {
            
            a.innerText = 'Clicou!'
            a.style.background = 'yellow'
        }/* Função que chama o evento */

        function entrar() {
            a.innerText = 'Entrou!'
        }

        function saiu() {
            a.innerText = 'Saiu!'
            a.style.background = 'cyan'
        }

        function mover() {
            a.innerText = 'Moveu!'
        }
    </script>
</body>
</html>
